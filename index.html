/* ===== TASARIM SİSTEMİ ===== */
:root {

  --title:      #5D2E2E;
  --rule:       #C9B68A;
  --rule-soft:  #E1D2AA;
  --gold:       #B8862F;
  --gold-soft:  #DCC084;
  --accent:     #C62828;
  --accent-ink: #8B1C1C;
  --success:    #558B2F;
  --warn:       #F9A825;
  --r-karadeniz:   #2E7D32;
  --r-akdeniz:     #E65100;
  --r-icanadolu:   #795548;
  --r-ege:         #7CB342;

  --font-display: 'Caveat', cursive;
  --font-hand:    'Patrick Hand', cursive;
  --font-body:    'Quicksand', system-ui, sans-serif;

}
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; }
body {
  font-family: var(--font-body);
  color: var(--ink);
  background: var(--bg-paper);

}
#root { height: 100%; }
#root:empty::before {
  content: "Yükleniyor…";
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh;
  font-family: var(--font-hand); font-size: 24px; color: var(--title);
  background: var(--bg-paper);
}

/* Kâğıt dokusu */
.paper {
  background-color: var(--bg-paper);
  background-image:
    radial-gradient(at 20% 15%, rgba(212,188,154,.28) 0%, transparent 45%),

  background-size: auto, auto, 320px 320px;
}
.paper-cream {
  background-color: var(--bg-cream);
  background-image:
    url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='280' height='280'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.95' numOctaves='2' seed='7'/><feColorMatrix values='0 0 0 0 0.55 0 0 0 0 0.42 0 0 0 0 0.28 0 0 0 0.06 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  background-size: 280px 280px;
}

/* Genel bileşenler */
.card {
  background: var(--bg-cream); border: 1.5px solid var(--rule-soft);
  border-radius: var(--r-lg); padding: 18px 20px; box-shadow: var(--shadow-sm);
}
.deckle {
  box-shadow: var(--shadow-md);
  position: relative;
}
.deckle::before {
  content: ""; position: absolute; inset: 0; border-radius: inherit; pointer-events: none;

}
.btn {

  transition: transform .15s, filter .15s, box-shadow .15s;
  user-select: none;
}
.btn:hover { transform: translateY(-1px); filter: brightness(1.05); }
.btn:active { transform: translateY(0); }
.btn-primary {
  background: var(--accent); color: #FFF7EB; border-color: var(--accent-ink);

.btn-secondary {

.btn-ghost {
  background: transparent; color: var(--accent); border-color: transparent;

}
.btn-disabled { background: #E8DEC9; color: #A89880; border-color: #D7C9A6; cursor: not-allowed; box-shadow: none; }
.btn-lg { min-height: 54px; padding: 14px 28px; font-size: 18px; }
.btn-sm { min-height: 36px; padding: 7px 14px; font-size: 14px; }

.input {
  width: 100%; font-family: var(--font-body); font-size: 17px; color: var(--ink);
  background: var(--bg-cream); border: 1.5px solid var(--ink-mute);
  border-radius: var(--r-sm); padding: 13px 16px; outline: none;

.t-hand { font-family: var(--font-hand); color: var(--title); }

#leaflet-map { width: 100%; height: 100%; }
.leaflet-container { background: #D9EAF7 !important; }
.leaflet-region-label {

  text-shadow: 0 1px 4px rgba(0,0,0,.75), 0 0 8px rgba(0,0,0,.5);
}

/* Animasyonlar */
@keyframes float-y { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
@keyframes spin-slow { to { transform: rotate(360deg); } }
@keyframes shimmer { 0%,100% { opacity: .55; } 50% { opacity: 1; } }
@keyframes confetti-fall {
  0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}
@keyframes pop-in {
  0% { transform: scale(.4); opacity: 0; }
  70% { transform: scale(1.1); }
  100% { transform: scale(1); opacity: 1; }
}
@keyframes shake {
  0%,100% { transform: translateX(0); }
  25% { transform: translateX(-8px); }
  75% { transform: translateX(8px); }
}
.float { animation: float-y 4s ease-in-out infinite; }
.shimmer { animation: shimmer 2.4s ease-in-out infinite; }

.badge-circle {
  border-radius: 50%; display: grid; place-items: center;

.corner { position: absolute; width: 44px; height: 44px; color: var(--gold); opacity: .8; }
.corner.tl { top: 14px; left: 14px; }
.corner.tr { top: 14px; right: 14px; transform: scaleX(-1); }
.corner.bl { bottom: 14px; left: 14px; transform: scaleY(-1); }
.corner.br { bottom: 14px; right: 14px; transform: scale(-1,-1); }

.option-btn.correct { border-color: var(--success); background: #E9F4DC; box-shadow: 0 4px 14px rgba(85,139,47,.22); }
.option-btn.wrong { border-color: #D32F2F; background: #FFEBEE; }
.option-letter {

.option-btn.correct .option-letter { background: var(--success); border-color: var(--success); color: #FFF7EB; }
.option-btn.wrong .option-letter { background: #D32F2F; border-color: #D32F2F; color: #FFF7EB; }

// Wikipedia görseli önbelleği
const _wikiCache = {};
async function fetchWikiThumb(title) {
  if (_wikiCache[title] !== undefined) return _wikiCache[title];
  try {
    const r = await fetch(
      `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(title)}`,
      { headers: { Accept: 'application/json' } }
    );
    const d = await r.json();
    _wikiCache[title] = d.thumbnail?.source || null;
  } catch { _wikiCache[title] = null; }
  return _wikiCache[title];
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

  } catch { return { playerName: '', completedRegions: {}, sessionScore: 0 }; }
};
const saveState = (s) => {
  try { localStorage.setItem(LS_KEY, JSON.stringify(s)); } catch {}
};

Object.assign(window, { REGIONS, REGION_CSS, SCREENS, fetchWikiThumb, shuffle });

/* ── HARİTA EKRANI ── */
const MapScreen = ({ playerName, completedRegions, sessionScore, onRegionClick }) => {
  const mapRef = useRef(null);
  const leafletRef = useRef(null);
  const layersRef = useRef({});
  const [hovered, setHovered] = useState(null);
  const doneCount = Object.keys(completedRegions).length;

  useEffect(() => {
    if (leafletRef.current) {
      // Sadece stilleri güncelle
      Object.entries(layersRef.current).forEach(([rid, layer]) => {
        layer.setStyle(getLayerStyle(rid));
      });
      return;
    }
    const map = L.map(mapRef.current, {
      center: [39.0, 35.5], zoom: 6,
      scrollWheelZoom: true, dragging: true,
      attributionControl: true, zoomControl: true,
    });
    leafletRef.current = map;

    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
      attribution: '© OpenStreetMap © CARTO',
      subdomains: 'abcd', maxZoom: 10, minZoom: 5,
    }).addTo(map);

    fetch('regions.geojson')
      .then(r => r.json())
      .then(geojson => {
        L.geoJSON(geojson, {
          style: f => getLayerStyle(f.properties.id),
          onEachFeature: (feature, layer) => {
            const rid = feature.properties.id;
            const region = REGIONS.find(r => r.id === rid);
            layersRef.current[rid] = layer;

            layer.on('mouseover', () => {
              setHovered(rid);
              if (!completedRegions[rid])
                layer.setStyle({ fillOpacity: .8, weight: 3 });
            });
            layer.on('mouseout', () => {
              setHovered(null);
              layer.setStyle(getLayerStyle(rid));
            });
            layer.on('click', () => onRegionClick(rid));

            if (region) {
              const center = layer.getBounds().getCenter();
              L.marker(center, {
                icon: L.divIcon({
                  className: 'leaflet-region-label',
                  html: `<span>${region.icon} ${region.name.replace(' Bölgesi','')}</span>`,
                  iconSize: [140, 22], iconAnchor: [70, 11],
                }),
                interactive: false,
              }).addTo(map);
            }
          }
        }).addTo(map);
        setTimeout(() => map.invalidateSize(), 100);
      });
  }, []);

  // Stil hesaplama — completedRegions güncel versiyonunu closure dışından al
  const getLayerStyle = (rid) => {
    const region = REGIONS.find(r => r.id === rid);
    const color = region ? region.color : '#888';
    const done = completedRegions[rid];
    return {
      color: '#fff', weight: 1.5,
      fillColor: done ? '#558B2F' : color,
      fillOpacity: done ? .85 : .55,
    };
  };

  // completedRegions değiştiğinde katmanları güncelle
  useEffect(() => {
    Object.entries(layersRef.current).forEach(([rid, layer]) => {
      layer.setStyle(getLayerStyle(rid));
    });
  }, [completedRegions]);

  useEffect(() => {
    setTimeout(() => leafletRef.current?.invalidateSize(), 200);
  }, []);

  const hoveredRegion = hovered ? REGIONS.find(r => r.id === hovered) : null;

  return (
    <div style={{
      height: '100vh', display: 'flex', flexDirection: 'column',
      background: 'var(--bg-paper)', fontFamily: 'var(--font-body)',
    }}>
      {/* Üst Bar */}
      <div className="paper-cream" style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '10px 20px', borderBottom: '1.5px solid var(--rule-soft)',
        boxShadow: '0 2px 8px rgba(62,39,35,.08)',
      }}>
        <div style={{ display:'flex', alignItems:'center', gap:10 }}>
          <span style={{ fontSize:20 }}>🎒</span>
          <span className="t-hand" style={{ fontSize:18 }}>{playerName}</span>
        </div>
        <div style={{ textAlign:'center' }}>
          <div className="t-label" style={{ fontSize:10 }}>İLERLEME</div>
          <div className="t-hand" style={{ fontSize:17, color:'var(--title)' }}>{doneCount}/7 Bölge</div>
        </div>
        <div style={{ textAlign:'right' }}>
          <div className="t-label" style={{ fontSize:10 }}>PUAN</div>
          <div className="t-hand" style={{ fontSize:17, color:'var(--accent)' }}>
            {sessionScore.toLocaleString('tr-TR')}
          </div>
        </div>
      </div>

      {/* Harita alanı */}
      <div style={{ flex:1, position:'relative', overflow:'hidden' }}>
        <div ref={mapRef} style={{ width:'100%', height:'100%' }}/>

        {/* Hover tooltip */}
        {hoveredRegion && (
          <div style={{
            position:'absolute', bottom:20, left:'50%', transform:'translateX(-50%)',
            background:'rgba(250,246,236,.97)', border:'1.5px solid var(--rule)',
            borderRadius:14, padding:'12px 20px', zIndex:1000,
            boxShadow:'var(--shadow-lg)', fontFamily:'var(--font-body)',
            minWidth:300, maxWidth:420, pointerEvents:'none',
          }}>
            <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:8 }}>
              <span style={{ fontSize:24 }}>{hoveredRegion.icon}</span>
              <div>

/* ── QUIZ EKRANI ── */
const QuizScreen = ({ regionId, onComplete, onBack }) => {
  const region = REGIONS.find(r => r.id === regionId);
  const [questions] = useState(() => {
    return shuffle(region.questions).map(q => {
      const correctText = q.options[q.correct];
      const shuffledOpts = shuffle(q.options);
      return { ...q, options: shuffledOpts, correct: shuffledOpts.indexOf(correctText) };
    });
  });
  const [qi, setQi] = useState(0);
  const [selected, setSelected] = useState(null);
  const [answered, setAnswered] = useState(false);
  const [score, setScore] = useState(0);
  const [correct, setCorrect] = useState(0);
  const [wikiImg, setWikiImg] = useState(null);
  const [shake, setShake] = useState(false);

  const q = questions[qi];
  const letters = ['A','B','C','D'];

  useEffect(() => {
    setWikiImg(null);
    if (q.wikiTitle) fetchWikiThumb(q.wikiTitle).then(setWikiImg);
  }, [qi]);

  const handleSelect = (i) => {
    if (answered) return;
    setSelected(i);
    setAnswered(true);
    if (i === q.correct) {
      setScore(s => s + 100);
      setCorrect(c => c + 1);
    } else {
      setShake(true);
      setTimeout(() => setShake(false), 500);
    }
  };

  const handleNext = () => {
    const finalScore = score;
    const finalCorrect = correct;
    if (qi + 1 >= questions.length) {
      onComplete(finalScore, finalCorrect);
    } else {
      setQi(qi + 1);
      setSelected(null);
      setAnswered(false);
    }
  };

  const progressPct = ((qi) / questions.length) * 100;

  return (
    <div className="paper" style={{
      minHeight:'100vh', padding:'0', fontFamily:'var(--font-body)',
      display:'flex', flexDirection:'column',
    }}>
      {/* Üst Bar */}
      <div className="paper-cream" style={{
        padding:'10px 20px', borderBottom:'1.5px solid var(--rule-soft)',
        display:'flex', alignItems:'center', gap:14,
      }}>
        <button className="btn btn-ghost btn-sm" onClick={onBack}>← Harita</button>
        <div style={{ flex:1 }}>
          <div style={{ display:'flex', justifyContent:'space-between', marginBottom:4 }}>
            <span className="t-hand" style={{ fontSize:15 }}>{region.icon} {region.name}</span>
            <span className="t-label" style={{ fontSize:11 }}>{qi+1}/{questions.length}</span>
          </div>
          <div style={{
            height:6, background:'var(--bg-deep)', borderRadius:999, overflow:'hidden',
          }}>
            <div style={{
              height:'100%', width:`${progressPct}%`,
              background:'var(--accent)', borderRadius:999, transition:'width .4s',
            }}/>
          </div>
        </div>
        <div className="t-hand" style={{ fontSize:16, color:'var(--accent)', flexShrink:0 }}>
          {score} puan
        </div>
      </div>

      {/* Soru */}
      <div style={{ flex:1, padding:'24px', maxWidth:760, margin:'0 auto', width:'100%', display:'flex', flexDirection:'column', gap:20 }}>

        {/* Görsel + Soru */}
        <div style={{ display:'flex', gap:18, alignItems:'flex-start' }}>
          {wikiImg && (
            <div style={{
              flex:'0 0 180px', borderRadius:12, overflow:'hidden',
              border:'2px solid var(--rule-soft)', boxShadow:'var(--shadow-sm)',
            }}>
              <img src={wikiImg} alt="" style={{ width:'100%', height:130, objectFit:'cover', display:'block' }}/>
              <div style={{ padding:'4px 8px', fontSize:11, color:'var(--ink-mute)', textAlign:'center', fontStyle:'italic' }}>
                {q.imageCaption}
              </div>
            </div>
          )}
          <div style={{ flex:1 }}>
            <div style={{ fontFamily:'var(--font-hand)', fontSize:12, color:'var(--ink-mute)', marginBottom:6 }}>
              SORU {qi+1}
            </div>
            <div className="t-display" style={{
              fontSize:20, lineHeight:1.45, color:'var(--ink)',
              animation: shake ? 'shake 400ms ease' : 'none',
            }}>
              {q.text}
            </div>
          </div>
        </div>

        {/* Seçenekler */}
        <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
          {q.options.map((opt, i) => {
            let cls = 'option-btn';
            if (answered) {
              if (i === q.correct) cls += ' correct';
              else if (i === selected) cls += ' wrong';
            } else if (i === selected) cls += ' selected';
            return (
              <button key={i} className={cls} onClick={() => handleSelect(i)}>
                <div className="option-letter">{letters[i]}</div>
                <span style={{ flex:1 }}>{opt}</span>
                {answered && i === q.correct && <span style={{ color:'var(--success)', fontWeight:700 }}>✓</span>}
              </button>
            );
          })}
        </div>

        {/* Açıklama */}
        {answered && (
          <div style={{
            background: selected === q.correct ? 'rgba(85,139,47,.08)' : 'rgba(198,40,40,.06)',
            border: `1.5px solid ${selected===q.correct?'var(--success)':'var(--accent)'}`,
            borderRadius:10, padding:'12px 16px',
          }}>
            <div style={{
              fontFamily:'var(--font-hand)', fontWeight:700, fontSize:15, marginBottom:4,
              color: selected===q.correct ? 'var(--success)' : 'var(--accent)',
            }}>
              {selected === q.correct ? '🎉 Doğru!' : '❌ Yanlış'}
            </div>
            <div style={{ fontSize:14, color:'var(--ink-soft)', lineHeight:1.55 }}>{q.explanation}</div>
          </div>
        )}

        {/* İleri */}
        {answered && (
          <div style={{ textAlign:'center', marginTop:4 }}>
            <button className="btn btn-primary btn-lg" onClick={handleNext}>
              {qi+1 >= questions.length ? '🏅 Sonuçları Gör' : 'Sonraki Soru →'}
            </button>
          </div>
        )}
      </div>
    </div>
  );
};

          <div>

          </div>
        </div>
      </div>

      <div style={{
        fontFamily:'var(--font-hand)', fontSize:15, color:'var(--ink-mute)',
        marginTop:16, maxWidth:420, fontStyle:'italic',
      }}>
        💡 {region.funFact}
      </div>

      <button className="btn btn-primary btn-lg" onClick={onContinue} style={{ marginTop:28 }}>
        🗺️ Haritaya Dön
      </button>
    </div>
  );
};

/* ── FİNAL EKRANI ── */

  return (
    <div className="paper" style={{
      minHeight:'100vh', display:'flex', flexDirection:'column',
      alignItems:'center', justifyContent:'center', padding:'40px 24px',
      fontFamily:'var(--font-body)', textAlign:'center', position:'relative', overflow:'hidden',
    }}>
      <Confetti/>
      <CornerOrnament className="corner tl"/>
      <CornerOrnament className="corner tr"/>
      <CornerOrnament className="corner bl"/>
      <CornerOrnament className="corner br"/>

      <div className="float">
        <div className="t-display" style={{ fontSize:80, lineHeight:1 }}>🏆</div>

      <div className="card deckle" style={{ maxWidth:560, marginTop:28 }}>

        </div>
        <div style={{ marginTop:18, display:'flex', justifyContent:'space-around' }}>

          <div>

            <div className="t-display" style={{ fontSize:36, color:'var(--success)' }}>7/7</div>
          </div>
        </div>
      </div>

      <div style={{
        marginTop:20, padding:'12px 20px',

      }}>
        🎓 Türkiye'nin kültürel mirasını öğrendin! Bu bilgileri arkadaşlarınla paylaş.
      </div>

      <div style={{ marginTop:24, display:'flex', gap:12, flexWrap:'wrap', justifyContent:'center' }}>
        <button className="btn btn-primary btn-lg" onClick={onPlayAgain}>🔄 Yeniden Oyna</button>
        <button className="btn btn-secondary btn-lg" onClick={()=>window.print()}>🖨️ Sertifika Yazdır</button>
      </div>
    </div>
  );
};

Object.assign(window, { WelcomeScreen, MapScreen, RegionIntroScreen, QuizScreen, BadgeScreen, FinalScreen, Confetti, Logo, CornerOrnament });
</script>

<!-- ====== UYGULAMA ====== -->
<script type="text/babel" data-presets="react">
const { useState: useStateApp, useEffect: useEffectApp } = React;

const App = () => {
  const [appState, setAppState] = useStateApp(() => initialState());
  const [screen, setScreen] = useStateApp(window.SCREENS.WELCOME);
  const [activeRegion, setActiveRegion] = useStateApp(null);
  const [quizResult, setQuizResult] = useStateApp(null);

  const updateState = (updates) => {
    setAppState(prev => {
      const next = { ...prev, ...updates };
      saveState(next);
      return next;
    });
  };

  const handleStart = (name) => {
    updateState({ playerName: name, startedAt: new Date().toISOString() });
    setScreen(window.SCREENS.MAP);
  };

  const handleRegionClick = (rid) => {
    setActiveRegion(rid);
    setScreen(window.SCREENS.REGION_INTRO);
  };

  const handleStartQuiz = () => setScreen(window.SCREENS.QUIZ);

  const handleQuizComplete = (score, correctCount) => {
    setQuizResult({ score, correctCount });
    const region = REGIONS.find(r => r.id === activeRegion);
    updateState({
      completedRegions: {
        ...appState.completedRegions,
        [activeRegion]: { score, correctCount, badge: region.badge },
      },
      sessionScore: appState.sessionScore + score,
    });
    setScreen(window.SCREENS.BADGE);
  };

  const handleBadgeContinue = () => {
    setScreen(window.SCREENS.MAP);
    const doneCount = Object.keys(appState.completedRegions).length;
    if (doneCount >= 7) setTimeout(() => setScreen(window.SCREENS.FINAL), 600);
  };

  const handlePlayAgain = () => {
    updateState({ completedRegions: {}, sessionScore: 0 });
    setScreen(window.SCREENS.WELCOME);
  };

  const hasSaved = !!(appState.playerName && Object.keys(appState.completedRegions || {}).length > 0);
  const region = activeRegion ? REGIONS.find(r => r.id === activeRegion) : null;

  switch (screen) {
    case window.SCREENS.WELCOME:
      return <WelcomeScreen onStart={handleStart} hasSaved={hasSaved} savedName={appState.playerName}/>;

    case window.SCREENS.MAP:
      return <MapScreen
        playerName={appState.playerName}
        completedRegions={appState.completedRegions}
        sessionScore={appState.sessionScore}
        onRegionClick={handleRegionClick}
      />;

    case window.SCREENS.REGION_INTRO:
      return <RegionIntroScreen
        regionId={activeRegion}
        onStart={handleStartQuiz}
        onBack={()=>setScreen(window.SCREENS.MAP)}
      />;

    case window.SCREENS.QUIZ:
      return <QuizScreen
        regionId={activeRegion}
        onComplete={handleQuizComplete}
        onBack={()=>setScreen(window.SCREENS.MAP)}
      />;

    case window.SCREENS.BADGE:
      return <BadgeScreen
        regionId={activeRegion}
        score={quizResult?.score || 0}
        correctCount={quizResult?.correctCount || 0}
        totalCount={region?.questions?.length || 5}
        onContinue={handleBadgeContinue}
      />;

    case window.SCREENS.FINAL:
      return <FinalScreen
        playerName={appState.playerName}
        sessionScore={appState.sessionScore}
        completedRegions={appState.completedRegions}
        onPlayAgain={handlePlayAgain}
      />;

    default:
      return null;
  }
};

// Service Worker kaydı
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
